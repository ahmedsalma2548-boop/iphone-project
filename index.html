<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body  class="bod m-0 p-0 bg-black">
    <div class="container w-[100%] h-[100vh] relative">
        <div class="header flex justify-between items-center m-[30px] w-[90%] ">
            <img src="logo.png" class="w-[40px] cursor-pointer">
            <ul class="text-white flex justify-center items-center list-none  ">
                <li class="text-white mr-[20px] cursor-pointer semibold italic">Home</li>
                <li class="text-white mr-[20px] cursor-pointer semibold italic">Product</li>
                <li class="text-white mr-[20px] cursor-pointer semibold italic">Shop</li>
                <li class="text-white mr-[20px] cursor-pointer semibold italic">About</li>
                <li class="text-white mr-[20px] cursor-pointer semibold italic">Contact</li>
            </ul>
        </div>
        <div class="section flex justify-between items-center w-[80%] mx-auto">
            <div class="text w-[40%] ml-[50px]">
                <h1 class="uppercase text-white font-bold italic mb-5 text-xl ">iphone 13 pro max</h1>
                <p class="text-white font-semibold italic mb-5">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quasi, soluta nisi? Consequuntur, eos.</p>
                <a class="italic uppercase text-black font-bold py-2 px-[18px] bg-white rounded-xl " href="#">All Products</a>
            </div>
            <div class="image w-[30%]">
                <img class="img w-[200px]" src="0.png" alt="">
            </div>
        </div>
        <div class="absolute inset-x-0 bottom-0 flex justify-center gap-4">
            <img  class=" gold w-[50px] cursor-pointer transition-all duration-1000 ease-in-out hover:scale-125" src="0.png" alt="">
            <img  class=" blue w-[50px] cursor-pointer transition-all duration-1000 ease-in-out hover:scale-125" src="1.png" alt="">
            <img  class=" black w-[50px] cursor-pointer transition-all duration-1000 ease-in-out hover:scale-125" src="2.png" alt="">
            <img  class=" mink w-[50px] cursor-pointer transition-all duration-1000 ease-in-out hover:scale-125" src="3.png" alt="">
            <img  class=" red w-[50px] cursor-pointer transition-all duration-1000 ease-in-out hover:scale-125" src="4.png" alt="">
        </div>
        
    </div>
    <script src="main.js"></script>
  </body>
</html>
